[package]
name = "lattice"
version = "0.1.0"
edition = "2024"

[lib]
path = "src/lib.rs"

[dependencies]
wgpu = "22"
winit = "0.30"
gltf = "1"
rayon = "1"
anyhow = "1"
png = "0.17"
oklab = "1.1.2"
image = "0.25.10"
ndarray = "0.15"
rand = { version = "0.8", features = ["small_rng"] }
palette = "0.7.6"


[profile.release]
opt-level = 3
lto = "thin"
